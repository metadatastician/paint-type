# SPDX-License-Identifier: AGPL-3.0-or-later
name: Guix/Nix Package Policy
on: [push, pull_request]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Enforce Guix primary / Nix fallback
        run: |
          # paint-type uses Guix as the sole reproducible-dev vehicle.
          # Nix flakes are retired estate-wide (owner directive 2026-06-01).
          HAS_GUIX=$(find . -name "guix.scm" 2>/dev/null | head -1)
          NIX_LEAKS=$(find . -path "./third_party" -prune -o \( -name "flake.nix" -o -name "flake.lock" \) -print 2>/dev/null | head -5)

          NEW_LOCKS=$(git diff --name-only --diff-filter=A HEAD~1 2>/dev/null | grep -E 'package-lock\.json|yarn\.lock|Gemfile\.lock|Pipfile\.lock|poetry\.lock' || true)
          if [ -n "$NEW_LOCKS" ]; then
            echo "⚠️ Lock files detected. Prefer Guix manifests for reproducibility."
          fi
          
          # Prefer Guix, fallback to Nix
          if [ -n "$HAS_GUIX" ]; then
            echo "✅ Guix package management detected (primary)"
          elif [ -n "$HAS_NIX" ]; then
            echo "✅ Nix package management detected (fallback)"
          else
            echo "ℹ️ Consider adding guix.scm or flake.nix for reproducible builds"
          fi
          
          echo "✅ Package policy check passed"
