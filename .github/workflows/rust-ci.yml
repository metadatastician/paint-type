#
# rust-ci.yml — Cargo build, test, clippy, and fmt for paint-type.
# paint-type's Cargo.toml lives at src/ephapax/Cargo.toml; the workflow
# builds libpt (Zig static library) first so cargo can link it, then
# runs check / fmt / clippy / test against the ephapax crate.
name: Rust CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  check:
    name: Cargo check + clippy + fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: clippy, rustfmt

      - name: Install Zig 0.15
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v1
        with:
          version: 0.15.1

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: src/ephapax

      - name: Build libpt (Zig static library)
        run: |
          cd src/interface/ffi
          zig build

      - name: Cargo check
        working-directory: src/ephapax
        run: cargo check --all-targets

      - name: Cargo fmt
        working-directory: src/ephapax
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: src/ephapax
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Cargo test
    runs-on: ubuntu-latest
    needs: check
    if: hashFiles('src/ephapax/Cargo.toml') != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Install Zig 0.15
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v1
        with:
          version: 0.15.1

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: src/ephapax

      - name: Build libpt (Zig static library)
        run: |
          cd src/interface/ffi
          zig build

      - name: Run tests
        working-directory: src/ephapax
        run: cargo test --all-targets

      - name: Write summary
        if: always()
        run: |
          echo "## Rust CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **cargo check**: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **cargo test**: completed" >> "$GITHUB_STEP_SUMMARY"
