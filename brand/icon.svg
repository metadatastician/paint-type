<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="box-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3f0a18" />
      <stop offset="100%" stop-color="#0d1117" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0d1117" rx="64"/>
  <circle cx="256" cy="256" r="200" fill="url(#bg-glow)" opacity="0.8"/>

  <!-- Formal Type Structure (Geometric, precise) -->
  <g fill="none" stroke="#e11d48" stroke-width="2" opacity="0.25" filter="url(#box-glow)">
    <rect x="136" y="136" width="240" height="240" rx="24"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="96" y1="256" x2="416" y2="256"/>
    <circle cx="256" cy="256" r="80"/>
  </g>

  <!-- Solid structural frame -->
  <rect x="156" y="156" width="200" height="200" rx="16" fill="none" stroke="#f43f5e" stroke-width="3.5" opacity="0.85" filter="url(#box-glow)"/>

  <!-- Fluid Brush Stroke (Dynamic, expressive) -->
  <path d="
    M 96,356
    C 140,360 160,220 220,180
    C 280,140 320,280 370,270
    C 410,260 410,180 436,156
  " fill="none" stroke="#f43f5e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <path d="
    M 106,376
    C 146,380 170,240 226,200
    C 276,164 310,296 364,290
    C 396,284 404,210 426,182
  " fill="none" stroke="#f43f5e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.75" filter="url(#glow)"/>
</svg>
