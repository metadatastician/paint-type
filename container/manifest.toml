# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Cerro Torre manifest for paint-type .ctp bundle
#
# This manifest describes the container image for verified
# container packaging. Used by `ct pack` to create .ctp bundles.

[metadata]
name = "paint-type"
version = "0.1.0"
revision = 1
summary = "paint-type image editor — container service"
description = """
paint-type — cross-platform open-source image editor. Containerised service
packaged as a verified cerro-torre .ctp bundle with ML-DSA-87 signing and
full provenance tracking.
"""
license = "AGPL-3.0-or-later"
homepage = "https://github.com/metadatastician/paint-type"
maintainer = "Joshua Jewell <paint-type@pm.me>"

[provenance]
upstream = "https://github.com/metadatastician/paint-type"
import_date = 2026-05-11T00:00:00Z

[dependencies]
runtime = ["ca-certificates", "curl"]
build = ["zig", "rust", "cargo"]

[build]
system = "podman"

[build.environment]
APP_HOST = "[::]"
APP_PORT = "8080"

[outputs]
primary = "paint-type"
split = []

[attestations]
require = ["source-signature", "sbom-complete"]
recommend = ["security-audit", "reproducible-build"]

[security]
user = "appuser"
group = "appuser"
read_only_root = false
no_new_privileges = true

[security.capabilities]
drop = ["ALL"]
add = []

[security.network]
listen_tcp = [8080]

[security.filesystem]
read = ["/app/"]
write = ["/tmp/"]
execute = ["/app/entrypoint.sh"]
