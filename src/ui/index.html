<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>paint.type</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #1e1e1e; color: #ddd; display: flex; height: 100vh; }
  #toolbar { width: 220px; padding: 12px; background: #252526; display: flex; flex-direction: column; gap: 12px; }
  #toolbar label { display: flex; flex-direction: column; font-size: 12px; gap: 4px; }
  #stage { flex: 1; display: grid; place-items: center; overflow: auto; }
  #canvas { background: #fff; box-shadow: 0 0 0 1px #000, 0 8px 24px rgba(0,0,0,.5); image-rendering: pixelated; cursor: crosshair; }
  button { padding: 6px 10px; background: #0e639c; color: #fff; border: 0; border-radius: 3px; cursor: pointer; }
  #status { font-size: 11px; color: #888; min-height: 14px; }
  .size-row { display: flex; align-items: center; gap: 8px; }
  #size-val { font-variant-numeric: tabular-nums; min-width: 42px; }
  #hardness-val { font-variant-numeric: tabular-nums; min-width: 42px; }
  #brush-preview { width: 72px; height: 72px; display: grid; place-items: center; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; }
  #brush-dot { border-radius: 50%; }
  #tools { display: flex; gap: 6px; }
  #tools button { flex: 1; padding: 6px 4px; background: #3c3c3c; color: #ccc; border: 0; border-radius: 3px; cursor: pointer; font-size: 12px; }
  #tools button.active { background: #555; color: #fff; }
</style>
</head>
<body>
  <div id="toolbar">
    <strong>paint.type</strong>
    <div id="tools">
      <button id="tool-brush">Brush</button>
      <button id="tool-eraser">Eraser</button>
      <button id="tool-fill">Fill</button>
    </div>
    <label>Colour <input id="colour" type="color" value="#cc0000"></label>
    <label>Brush size
      <span class="size-row">
        <input id="size" type="range" min="1" max="64" value="16">
        <output id="size-val">16 px</output>
      </span>
    </label>
    <label>Hardness
      <span class="size-row">
        <input id="hardness" type="range" min="0" max="100" value="0">
        <output id="hardness-val">0%</output>
      </span>
    </label>
    <label>Preview
      <span id="brush-preview"><span id="brush-dot"></span></span>
    </label>
    <button id="open-btn">Open PNG</button>
    <button id="save">Save PNG...</button>
    <div id="status">Starting...</div>
  </div>
  <div id="stage"><canvas id="canvas" width="1024" height="768"></canvas></div>
<script>
(function () {
  "use strict";
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const status = document.getElementById("status");
  const colourEl = document.getElementById("colour");
  const sizeEl = document.getElementById("size");
  const sizeVal = document.getElementById("size-val");
  const hardnessEl = document.getElementById("hardness");
  const hardnessVal = document.getElementById("hardness-val");
  const dot = document.getElementById("brush-dot");
  const DOC_W = canvas.width, DOC_H = canvas.height;

  function bridgeReady() { return typeof window.__gossamer_invoke === "function"; }

  function invoke(payload) {
    if (!bridgeReady()) return Promise.reject(new Error("Gossamer runtime unavailable"));
    return window.__gossamer_invoke("dispatch", payload);
  }

  function hexToRgba(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16) / 255,
      g: parseInt(hex.slice(3, 5), 16) / 255,
      b: parseInt(hex.slice(5, 7), 16) / 255,
      a: 1.0
    };
  }

  // Show what the current brush actually looks like: a disc of the chosen
  // diameter and colour, with feathering that mirrors the hardness setting.
  function updatePreview() {
    const d = Number(sizeEl.value);
    const h = Number(hardnessEl.value);
    sizeVal.textContent = d + " px";
    hardnessVal.textContent = h + "%";
    dot.style.width = d + "px";
    dot.style.height = d + "px";
    // Hard (>= 50): sharp two-stop disc; soft (< 50): Gaussian-style falloff.
    const col = colourEl.value;
    if (h >= 50) {
      dot.style.background = "radial-gradient(circle closest-side, " + col + " 50%, transparent 50%)";
    } else {
      dot.style.background = "radial-gradient(circle, " + col + " 0%, " +
        col + " 35%, transparent 70%)";
    }
  }

  function blit(dirty) {
    if (!dirty) return;
    const bytes = Uint8ClampedArray.from(atob(dirty.rgba_base64), (c) => c.charCodeAt(0));
    ctx.putImageData(new ImageData(bytes, dirty.w, dirty.h), dirty.x, dirty.y);
  }

  function canvasPos(ev) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (ev.clientX - rect.left) * (DOC_W / rect.width),
      y: (ev.clientY - rect.top) * (DOC_H / rect.height)
    };
  }

  async function waitForBridge() {
    for (let i = 0; i < 200 && !bridgeReady(); i++) {
      await new Promise((r) => setTimeout(r, 25));
    }
    return bridgeReady();
  }

  async function boot() {
    updatePreview();
    if (!(await waitForBridge())) {
      status.textContent = "IPC bridge unavailable - is this running inside Gossamer?";
      return;
    }
    await invoke({ cmd: "new_doc", w: DOC_W, h: DOC_H });
    const c = hexToRgba(colourEl.value);
    await invoke({ cmd: "set_colour", r: c.r, g: c.g, b: c.b, a: c.a });
    await invoke({ cmd: "set_brush", diameter: Number(sizeEl.value), hardness: Number(hardnessEl.value) / 100 });
    // Set initial tool state and visual highlighting.
    selectTool("brush");
    status.textContent = "Ready - drag on the canvas to paint.";
  }

  colourEl.addEventListener("input", () => {
    updatePreview();
    const c = hexToRgba(colourEl.value);
    invoke({ cmd: "set_colour", r: c.r, g: c.g, b: c.b, a: c.a }).catch(() => {});
  });
  sizeEl.addEventListener("input", () => {
    updatePreview();
    invoke({ cmd: "set_brush", diameter: Number(sizeEl.value), hardness: Number(hardnessEl.value) / 100 }).catch(() => {});
  });
  hardnessEl.addEventListener("input", () => {
    updatePreview();
    invoke({ cmd: "set_brush", diameter: Number(sizeEl.value), hardness: Number(hardnessEl.value) / 100 }).catch(() => {});
  });

  //## Tool selection
  let activeTool = "brush";

  function selectTool(kind) {
    activeTool = kind;
    // Update button visual state.
    ["brush", "eraser", "fill"].forEach((t) => {
      document.getElementById("tool-" + t).classList.toggle("active", t === kind);
    });
    // Notify the backend (fire-and-forget).
    invoke({ cmd: "select_tool", kind }).catch(() => {});
    // Reflect tool in cursor.
    canvas.style.cursor = kind === "fill" ? "cell" : "crosshair";
  }

  document.getElementById("tool-brush").addEventListener("click", () => selectTool("brush"));
  document.getElementById("tool-eraser").addEventListener("click", () => selectTool("eraser"));
  document.getElementById("tool-fill").addEventListener("click", () => selectTool("fill"));

  // Coalesce pointer moves: keep only the latest position and run at most one
  // invoke in flight, so a fast drag never queues behind the IPC channel. The
  // core interpolates between samples, so dropping intermediate moves is lossless.
  let painting = false;
  let pendingMove = null;
  let draining = false;

  async function drainMoves() {
    if (draining) return;
    draining = true;
    while (pendingMove !== null) {
      const p = pendingMove;
      pendingMove = null;
      try {
        const res = await invoke({ cmd: "pointer_move", x: p.x, y: p.y });
        if (res && res.ok === "painted") blit(res.dirty);
      } catch (e) { /* ignore */ }
    }
    draining = false;
  }

  canvas.addEventListener("pointerdown", async (ev) => {
    if (!bridgeReady()) return;
    const p = canvasPos(ev);
    if (activeTool === "fill") {
      // Fill does not initiate a stroke; send a single fill_at command instead.
      status.textContent = "Filling...";
      try {
        const resp = await invoke({ cmd: "fill_at", x: p.x, y: p.y });
        if (resp && resp.dirty) blit(resp.dirty);
        status.textContent = "Filled.";
      } catch (e) {
        status.textContent = "Fill failed: " + e;
      }
      return;
    }
    // Brush or eraser: begin a stroke (backend tracks which tool is active).
    painting = true;
    canvas.setPointerCapture(ev.pointerId);
    try {
      const res = await invoke({ cmd: "pointer_down", x: p.x, y: p.y });
      if (res && res.ok === "painted") blit(res.dirty);
    } catch (e) { /* ignore */ }
  });
  canvas.addEventListener("pointermove", (ev) => {
    if (activeTool === "fill") return;
    if (!painting) return;
    pendingMove = canvasPos(ev);
    drainMoves();
  });
  canvas.addEventListener("pointerup", async () => {
    if (activeTool === "fill") return;
    if (!painting) return;
    painting = false;
    while (draining || pendingMove !== null) {
      await new Promise((r) => setTimeout(r, 4));
      drainMoves();
    }
    try { await invoke({ cmd: "pointer_up" }); } catch (e) { /* ignore */ }
  });

  document.getElementById("open-btn").addEventListener("click", async () => {
    if (!bridgeReady()) { status.textContent = "Cannot open - bridge unavailable."; return; }
    let path;
    if (typeof window.__gossamer_dialog_open === "function") {
      path = await window.__gossamer_dialog_open({ filter: "PNG files:*.png" });
    } else {
      path = window.prompt("PNG file path to open:");
    }
    if (!path) return;
    status.textContent = "Opening...";
    try {
      const resp = JSON.parse(await window.__gossamer_invoke("dispatch", JSON.stringify({ cmd: "open_png", path })));
      if (resp.dirty) {
        blit(resp.dirty);
      }
      status.textContent = "Opened.";
    } catch (e) {
      status.textContent = "Open failed: " + e;
    }
  });

  document.getElementById("save").addEventListener("click", async () => {
    if (!bridgeReady()) { status.textContent = "Cannot save - bridge unavailable."; return; }
    let path = "/tmp/painting.png";
    try {
      const chosen = await window.__gossamer_invoke("__gossamer_dialog_save", { defaultPath: path });
      if (chosen && typeof chosen === "string") path = chosen;
    } catch (e) { /* fall back to default path */ }
    const res = await invoke({ cmd: "save_png", path });
    status.textContent = (res && res.ok === "saved") ? "Saved " + res.path : "Save failed";
  });

  window.addEventListener("load", boot);
})();
</script>
</body>
</html>
