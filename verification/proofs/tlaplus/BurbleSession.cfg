\* TLC model-checking configuration for CONC-3 (session liveness).
\*
\* Run (deadlock checking off — the fully-converged quiescent state is a
\* legitimate terminal state, not a bug):
\*   java -cp tla2tools.jar tlc2.TLC -deadlock \
\*        -config BurbleSession.cfg BurbleSession.tla

SPECIFICATION Spec

CONSTANTS
    Peers = {p1, p2, p3}
    Mutations = {m1, m2}

INVARIANT TypeOK
INVARIANT Safe

PROPERTY Monotone
PROPERTY Liveness
